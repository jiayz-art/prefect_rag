# ===== 多模态RAG知识库系统 — 默认配置 =====

# --- 阿里云API ---
aliyun:
  api_key: "${ALIYUN_API_KEY}"  # 从环境变量读取
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  llm_model: "qwen-plus"
  vlm_model: "qwen-vl-plus"
  embedding_model: "text-embedding-v3"
  rerank_model: "gte-rerank"

# --- 离线索引 ---
index:
  persist_dir: "./data/chroma_db"
  bm25_index_path: "./data/bm25_index.pkl"
  metadata_db: "./data/metadata.db"
  chunk_size: 512
  chunk_overlap: 128
  embedding_batch_size: 10

# --- 在线检索 ---
retrieval:
  top_k_bm25: 20
  top_k_vector: 20
  top_k_keyword: 10
  top_k_final: 10
  rrf_k: 60
  confidence_threshold: 0.3
  max_rewrite_attempts: 1
  enable_rerank: true

# --- 缓存 ---
cache:
  l1_answer_ttl: 86400    # 答案缓存 24h
  l2_retrieval_ttl: 3600  # 检索结果缓存 1h
  l3_embedding_ttl: 0     # Embedding缓存 永久(0=不过期)
  cache_backend: "sqlite"  # sqlite | redis
  redis_url: "redis://localhost:6379/0"

# --- 文档处理 ---
documents:
  supported_extensions: [".pdf", ".md", ".markdown", ".png", ".jpg", ".jpeg", ".bmp"]
  ocr_lang: "ch"
  enable_vlm_for_images: true

# --- 服务 ---
api:
  host: "0.0.0.0"
  port: 8000
  workers: 1
